<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Code Explainer Pro</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />

<!-- 🔥 NO CACHE FIX -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<style>
body {
  font-family: Arial;
  background: #0b1220;
  color: #fff;
  padding: 20px;
}
textarea {
  width: 100%;
  height: 200px;
  margin-top: 10px;
  background: #111;
  color: #fff;
  border: 1px solid #333;
  padding: 10px;
}
button {
  padding: 10px 15px;
  margin-top: 10px;
  cursor: pointer;
}
pre {
  background: #111;
  padding: 10px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<h2>⚡ Code Explainer Pro</h2>

<select id="feature">
  <option value="explainer">Explainer</option>
  <option value="converter">Converter</option>
  <option value="optimizer">Optimizer</option>
  <option value="prompt-to-code">Prompt → Code</option>
  <option value="half-fill">Half Fill</option>
  <option value="compressor">🔥 Compressor</option>
</select>

<textarea id="code" placeholder="Paste your code here..."></textarea>

<br>
<button onclick="run()">Run</button>

<pre id="output">Output will appear here...</pre>

<script>

async function run() {
  console.log("🔥 BUTTON CLICKED");

  const feature = document.getElementById("feature").value;
  const code = document.getElementById("code").value;

  if (!code.trim() && feature !== 'prompt-to-code') {
    alert("Enter code");
    return;
  }

  let endpoint = "";
  let body = {};

  // ✅ FINAL ENDPOINT LOGIC
  if (feature === 'converter') {
    endpoint = '/api/convert';
    body = { code };

  } else if (feature === 'optimizer') {
    endpoint = '/api/optimize';
    body = { code };

  } else if (feature === 'prompt-to-code') {
    endpoint = '/api/prompt-to-code';
    body = { prompt: code };

  } else if (feature === 'half-fill') {
    endpoint = '/api/fill-code';
    body = { code };

  } else if (feature === 'compressor') {
    endpoint = '/api/compress';
    body = { code, language: "same" };

  } else {
    endpoint = '/api/explain';
    body = { code };
  }

  console.log("📡 Endpoint:", endpoint);
  console.log("📦 Body:", body);

  try {
    const res = await fetch(endpoint, {
      method: 'POST', // 🔥 IMPORTANT FIX
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    const raw = await res.text();
    console.log("RAW RESPONSE:", raw);

    let data;
    try {
      data = JSON.parse(raw);
    } catch {
      throw new Error(raw);
    }

    if (!res.ok) {
      throw new Error(data.error || "Request failed");
    }

    const result =
      data.result ||
      data.explanation ||
      data.generated ||
      JSON.stringify(data, null, 2);

    document.getElementById("output").textContent = result;

  } catch (err) {
    document.getElementById("output").textContent = "❌ " + err.message;
  }
}

</script>

</body>
</html>
